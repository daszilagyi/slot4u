; slot4u — PHP fejlesztői beállítások (konténer)
memory_limit = 512M
upload_max_filesize = 32M
post_max_size = 32M
max_execution_time = 120

; Időkezelés: minden UTC-ben tárolva (lásd CLAUDE.md / docs)
date.timezone = UTC

; OPcache — dev: revalidate gyakran, hogy a kódváltozás azonnal látszódjon
opcache.enable = 1
opcache.enable_cli = 0
opcache.revalidate_freq = 0
opcache.validate_timestamps = 1

display_errors = On
error_reporting = E_ALL
